<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vandana Inventory</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        input { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn-in { background-color: #28a745; } /* Green */
        .btn-out { background-color: #dc3545; } /* Red */
        button:hover { opacity: 0.9; }
        table { width: 100%; margin-top: 25px; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📦 Vandana Inventory</h2>
        
        <label>शेड नंबर / आइटम का नाम:</label>
        <input type="text" id="shadeNo" placeholder="जैसे: 101 या लाल धागा">
        
        <label>मात्रा (Quantity):</label>
        <input type="number" id="qty" placeholder="कितने बॉक्स?">
        
        <div class="btn-group">
            <button class="btn-in" id="btnIn">Stock IN (+)</button>
            <button class="btn-out" id="btnOut">Stock OUT (-)</button>
        </div>

        <h3>📊 मास्टर स्टॉक (Live)</h3>
        <table>
            <thead>
                <tr>
                    <th>शेड नंबर</th>
                    <th>कुल स्टॉक</th>
                </tr>
            </thead>
            <tbody id="stockTableBody">
                <!-- लाइव डेटा यहाँ आएगा -->
            </tbody>
        </table>
    </div>

    <!-- Firebase Connection Script -->
    <script type="module">
        // Firebase को इम्पोर्ट करें
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, get, set, child, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        // आपकी Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAGcWUM4lqJKmV2Zz2Em3WtI-D0fcQeuzQ",
            authDomain: "vandana-inventory.firebaseapp.com",
            databaseURL: "https://vandana-inventory-default-rtdb.firebaseio.com",
            projectId: "vandana-inventory",
            storageBucket: "vandana-inventory.firebasestorage.app",
            messagingSenderId: "714747540875",
            appId: "1:714747540875:web:dfb72712b485039325eb8e"
        };

        // Firebase चालू करें
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // HTML से बटन और इनपुट बॉक्स को लिंक करना
        const btnIn = document.getElementById("btnIn");
        const btnOut = document.getElementById("btnOut");
        const shadeNoInput = document.getElementById("shadeNo");
        const qtyInput = document.getElementById("qty");
        const stockTableBody = document.getElementById("stockTableBody");

        // माल अपडेट करने का फंक्शन (IN या OUT)
        async function updateStock(type) {
            const shade = shadeNoInput.value.trim().toUpperCase();
            const qty = parseInt(qtyInput.value);

            if (!shade || isNaN(qty) || qty <= 0) {
                alert("कृपया सही शेड नंबर और मात्रा डालें!");
                return;
            }

            const stockRef = ref(db, 'MasterStock/' + shade);
            
            // पहले चेक करें कि गोदाम में कितना माल है
            get(stockRef).then((snapshot) => {
                let currentStock = snapshot.exists() ? snapshot.val().quantity : 0;
                let newStock = 0;

                if (type === 'IN') {
                    newStock = currentStock + qty;
                } else if (type === 'OUT') {
                    if (currentStock < qty) {
                        alert("गोदाम में इतना माल नहीं है! (कुल स्टॉक: " + currentStock + ")");
                        return;
                    }
                    newStock = currentStock - qty;
                }

                // नया स्टॉक फायरबेस में सेव करें
                set(stockRef, { quantity: newStock })
                .then(() => {
                    shadeNoInput.value = "";
                    qtyInput.value = "";
                })
                .catch((error) => {
                    alert("एंट्री फेल हो गई: " + error);
                });
            });
        }

        // बटन दबाने पर फंक्शन चलाएं
        btnIn.addEventListener("click", () => updateStock('IN'));
        btnOut.addEventListener("click", () => updateStock('OUT'));

        // लाइव डेटा (मास्टर स्टॉक) दिखाने के लिए
        const masterStockRef = ref(db, 'MasterStock');
        onValue(masterStockRef, (snapshot) => {
            stockTableBody.innerHTML = ""; // पुरानी लिस्ट साफ करें
            
            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const shade = childSnapshot.key;
                    const stockData = childSnapshot.val();
                    
                    const row = `<tr>
                        <td>${shade}</td>
                        <td><b>${stockData.quantity}</b> बॉक्स</td>
                    </tr>`;
                    stockTableBody.innerHTML += row;
                });
            } else {
                stockTableBody.innerHTML = "<tr><td colspan='2'>अभी कोई स्टॉक नहीं है।</td></tr>";
            }
        });
    </script>
</body>
</html>
